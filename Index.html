<style>
#knight-section {
  background: transparent;
  flex-direction: column;
  min-height: 160vh;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

#knight-scene {
  position: relative;
  width: 70vw;
  max-width: 650px;
  display: flex;
  align-items: center;
  justify-content: center;

  perspective: 1600px;
  transform-style: preserve-3d;
}

/* BACKGROUND GLOW */
#knight-glow-bg {
  position: absolute;
  width: 85%;
  height: 85%;

  background:
    radial-gradient(
      ellipse,
      rgba(212,232,208,0.08) 0%,
      rgba(212,232,208,0.03) 35%,
      transparent 70%
    );

  filter: blur(30px);

  animation: knightAura 6s ease-in-out infinite;

  z-index: 1;

  transform: translateZ(-80px);
}

@keyframes knightAura {
  0%,100% {
    transform: translateZ(-80px) scale(1);
    opacity: 0.5;
  }

  50% {
    transform: translateZ(-80px) scale(1.08);
    opacity: 1;
  }
}

/* SHADOW */
#knight-shadow {
  position: absolute;
  width: 70%;
  height: 18%;

  bottom: -6%;

  background:
    radial-gradient(
      ellipse,
      rgba(0,0,0,0.9) 0%,
      transparent 70%
    );

  filter: blur(30px);

  z-index: 0;

  transform: translateZ(-120px);
}

/* MAIN 3D WRAPPER */
#knight-img-layer {
  position: relative;
  width: 100%;

  transform-style: preserve-3d;
  will-change: transform;

  z-index: 3;
}

/* MAIN IMAGE */
#knight-img {
  width: 100%;

  opacity: 0;

  transition: opacity 2s ease;

  transform-style: preserve-3d;

  filter:
    drop-shadow(0 0 40px rgba(212,232,208,0.15))
    drop-shadow(0 25px 80px rgba(0,0,0,0.95));

  will-change: transform;
}

#knight-img.visible {
  opacity: 1;
}

/* FRACTURES */
#knight-fractures {
  position: absolute;

  inset: 0;

  pointer-events: none;

  opacity: 0;

  transition: opacity 2s ease;

  z-index: 4;

  transform-style: preserve-3d;
}

#knight-fractures.visible {
  opacity: 1;
}

.fracture-line {
  position: absolute;

  width: 2px;

  background:
    linear-gradient(
      to bottom,
      transparent,
      var(--crack),
      transparent
    );

  filter: blur(2px);

  box-shadow:
    0 0 10px rgba(212,232,208,0.8),
    0 0 25px rgba(212,232,208,0.3);

  animation: fracturePulse 3s ease-in-out infinite;
}

.fracture-line:nth-child(1) {
  left: 46%;
  top: 20%;
  height: 25%;
}

.fracture-line:nth-child(2) {
  left: 52%;
  top: 35%;
  height: 18%;
  animation-delay: 0.8s;
}

.fracture-line:nth-child(3) {
  left: 49%;
  top: 55%;
  height: 20%;
  animation-delay: 1.5s;
}

@keyframes fracturePulse {
  0%,100% {
    opacity: 0.3;
  }

  50% {
    opacity: 1;
  }
}

/* EYES */
#knight-eyes {
  position: absolute;

  top: 12%;
  left: 50%;

  display: flex;
  gap: 12px;

  opacity: 0;

  transition: opacity 2s ease;

  z-index: 5;

  transform-style: preserve-3d;
}

#knight-eyes.visible {
  opacity: 1;
}

.eye {
  width: 8px;
  height: 3px;

  border-radius: 50%;

  background: var(--crack);

  box-shadow:
    0 0 8px var(--crack),
    0 0 20px var(--crack);

  filter: blur(1px);

  animation: eyeGlow 4s ease-in-out infinite;
}

.eye:nth-child(2) {
  animation-delay: 0.3s;
}

@keyframes eyeGlow {
  0%,100% {
    opacity: 0.5;
  }

  50% {
    opacity: 1;
  }
}

/* TITLE */
#knight-title {
  position: absolute;

  bottom: 8%;
  left: 50%;

  transform: translateX(-50%);

  font-family: 'Cinzel', serif;

  font-size: clamp(0.5rem, 1.2vw, 0.8rem);

  letter-spacing: 0.5em;

  text-transform: uppercase;

  color: var(--silver);

  opacity: 0;

  transition: opacity 2s ease;

  white-space: nowrap;

  z-index: 6;
}

#knight-title.visible {
  opacity: 0.6;
}

/* MOBILE */
@media (max-width: 768px) {
  #knight-scene {
    width: 92vw;
  }
}
</style>

<script>
// ─────────────────────────────────────────────
// CINEMATIC KNIGHT SYSTEM
// ─────────────────────────────────────────────

const knightLayer = document.getElementById('knight-img-layer');
const knightImg = document.getElementById('knight-img');
const knightEyes = document.getElementById('knight-eyes');
const eyeEls = document.querySelectorAll('.eye');

let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

let targetRotX = 0;
let targetRotY = 0;

let currentRotX = 0;
let currentRotY = 0;

let eyeTarget = 0;
let eyeCurrent = 0;

// MOUSE
document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  const rect = knightLayer.getBoundingClientRect();

  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;

  const offsetX = (mouseX - centerX) / window.innerWidth;
  const offsetY = (mouseY - centerY) / window.innerHeight;

  targetRotY = offsetX * 24;
  targetRotX = -offsetY * 18;

  eyeTarget = offsetX * 10;

  // Eye intensity
  const dist = Math.hypot(
    mouseX - centerX,
    mouseY - centerY
  );

  const proximity = Math.max(0, 1 - dist / 450);

  eyeEls.forEach(eye => {
    eye.style.boxShadow = `
      0 0 ${10 + proximity * 25}px var(--crack),
      0 0 ${20 + proximity * 45}px var(--crack)
    `;
  });
});

// MOBILE TOUCH
document.addEventListener('touchmove', e => {
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: true });

// GYROSCOPE
window.addEventListener('deviceorientation', e => {
  if (!e.gamma) return;

  targetRotY = e.gamma * 0.35;
  targetRotX = (e.beta - 45) * 0.2;

}, { passive: true });

// MAIN ANIMATION LOOP
function animateKnight() {

  requestAnimationFrame(animateKnight);

  currentRotX += (targetRotX - currentRotX) * 0.05;
  currentRotY += (targetRotY - currentRotY) * 0.05;

  eyeCurrent += (eyeTarget - eyeCurrent) * 0.08;

  // FLOATING
  const floatY =
    Math.sin(Date.now() * 0.0012) * 10;

  // DEPTH MOTION
  const moveX = currentRotY * 1.5;
  const moveY = currentRotX * 1.2;

  // MAIN WRAPPER ROTATION
  knightLayer.style.transform = `
    perspective(1600px)
    rotateX(${currentRotX}deg)
    rotateY(${currentRotY}deg)
    translateY(${floatY}px)
  `;

  // IMAGE DEPTH
  knightImg.style.transform = `
    translateX(${moveX}px)
    translateY(${moveY}px)
    translateZ(60px)
    scale(1.03)
  `;

  // EYES
  knightEyes.style.transform = `
    translateX(calc(-50% + ${eyeCurrent}px))
    translateZ(120px)
  `;

  // FRACTURES
  document.getElementById('knight-fractures').style.transform = `
    translateZ(90px)
  `;
}

animateKnight();

// ─────────────────────────────────────────────
// SCROLL EMERGENCE
// ─────────────────────────────────────────────

ScrollTrigger.create({
  trigger: '#knight-section',
  start: 'top 75%',

  onEnter: () => {

    knightImg.classList.add('visible');

    setTimeout(() => {
      document
        .getElementById('knight-fractures')
        .classList.add('visible');
    }, 1000);

    setTimeout(() => {
      knightEyes.classList.add('visible');
    }, 1800);

    setTimeout(() => {
      document
        .getElementById('knight-title')
        .classList.add('visible');
    }, 2600);
  }
});

// SCROLL PARALLAX
gsap.to('#knight-scene', {
  y: -80,

  scrollTrigger: {
    trigger: '#knight-section',
    start: 'top bottom',
    end: 'bottom top',
    scrub: 1.5
  }
});
</script>
