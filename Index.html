<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Ashen Veil</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Infant:wght@300;400&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>

:root{
  --void:#080806;
  --bone:#c8bfaa;
  --silver:#8a8880;
  --gold:#c9a84c;
  --crack:#d4e8d0;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--void);
  color:var(--bone);
  overflow-x:hidden;
  font-family:'Cormorant Infant', serif;
}

/* CANVAS */

#three-canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* SECTION */

section{
  position:relative;
  z-index:2;
  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;
}

/* HERO */

#hero{
  flex-direction:column;
  text-align:center;
}

#hero-title{
  font-family:'Cinzel', serif;
  font-size:clamp(4rem,14vw,11rem);
  font-weight:900;
  letter-spacing:0.08em;

  text-shadow:
    0 0 40px rgba(255,255,255,0.08),
    0 0 80px rgba(255,255,255,0.05);
}

#hero-sub{
  margin-top:2rem;

  font-size:0.8rem;
  letter-spacing:0.5em;
  text-transform:uppercase;

  color:var(--silver);

  opacity:0.6;
}

/* KNIGHT SECTION */

#knight-section{
  min-height:160vh;
  overflow:hidden;
}

#knight-scene{
  position:relative;

  width:70vw;
  max-width:650px;

  display:flex;
  align-items:center;
  justify-content:center;

  perspective:1600px;
  transform-style:preserve-3d;
}

/* SHADOW */

#knight-shadow{
  position:absolute;

  width:70%;
  height:18%;

  bottom:-5%;

  background:
    radial-gradient(
      ellipse,
      rgba(0,0,0,0.95) 0%,
      transparent 70%
    );

  filter:blur(30px);

  transform:translateZ(-120px);

  z-index:0;
}

/* GLOW */

#knight-glow{
  position:absolute;

  width:85%;
  height:85%;

  background:
    radial-gradient(
      ellipse,
      rgba(212,232,208,0.09) 0%,
      rgba(212,232,208,0.03) 40%,
      transparent 70%
    );

  filter:blur(40px);

  animation:aura 6s ease-in-out infinite;

  transform:translateZ(-80px);

  z-index:1;
}

@keyframes aura{
  0%,100%{
    transform:translateZ(-80px) scale(1);
    opacity:0.5;
  }

  50%{
    transform:translateZ(-80px) scale(1.08);
    opacity:1;
  }
}

/* LAYER */

#knight-layer{
  position:relative;

  width:100%;

  transform-style:preserve-3d;

  z-index:3;
}

/* KNIGHT */

#knight-img{
  width:100%;

  opacity:0;

  transform-style:preserve-3d;

  transition:opacity 2s ease;

  filter:
    drop-shadow(0 0 40px rgba(212,232,208,0.18))
    drop-shadow(0 30px 90px rgba(0,0,0,0.95));

  will-change:transform;
}

#knight-img.visible{
  opacity:1;
}

/* FRACTURES */

#fractures{
  position:absolute;
  inset:0;

  opacity:0;

  transition:opacity 2s ease;

  pointer-events:none;

  z-index:4;
}

#fractures.visible{
  opacity:1;
}

.fracture{
  position:absolute;

  width:2px;

  background:
    linear-gradient(
      to bottom,
      transparent,
      var(--crack),
      transparent
    );

  filter:blur(2px);

  box-shadow:
    0 0 10px rgba(212,232,208,0.8),
    0 0 20px rgba(212,232,208,0.3);

  animation:pulse 3s ease-in-out infinite;
}

.fracture:nth-child(1){
  left:46%;
  top:20%;
  height:24%;
}

.fracture:nth-child(2){
  left:52%;
  top:38%;
  height:16%;
  animation-delay:0.8s;
}

.fracture:nth-child(3){
  left:49%;
  top:55%;
  height:20%;
  animation-delay:1.5s;
}

@keyframes pulse{
  0%,100%{
    opacity:0.3;
  }

  50%{
    opacity:1;
  }
}

/* EYES */

#eyes{
  position:absolute;

  top:12%;
  left:50%;

  display:flex;
  gap:12px;

  opacity:0;

  transition:opacity 2s ease;

  z-index:5;
}

#eyes.visible{
  opacity:1;
}

.eye{
  width:8px;
  height:3px;

  border-radius:50%;

  background:var(--crack);

  box-shadow:
    0 0 8px var(--crack),
    0 0 20px var(--crack);

  filter:blur(1px);

  animation:eyeGlow 4s ease-in-out infinite;
}

.eye:nth-child(2){
  animation-delay:0.3s;
}

@keyframes eyeGlow{
  0%,100%{
    opacity:0.5;
  }

  50%{
    opacity:1;
  }
}

/* TITLE */

#knight-title{
  position:absolute;

  bottom:8%;
  left:50%;

  transform:translateX(-50%);

  font-family:'Cinzel', serif;

  font-size:0.8rem;

  letter-spacing:0.5em;

  text-transform:uppercase;

  color:var(--silver);

  opacity:0;

  transition:opacity 2s ease;

  white-space:nowrap;

  z-index:6;
}

#knight-title.visible{
  opacity:0.6;
}

/* MOBILE */

@media(max-width:768px){

  #knight-scene{
    width:92vw;
  }

  #hero-title{
    font-size:5rem;
  }

}

</style>
</head>

<body>

<canvas id="three-canvas"></canvas>

<section id="hero">
  <div id="hero-title">SEALED</div>
  <div id="hero-sub">The Ashen Veil</div>
</section>

<section id="knight-section">

  <div id="knight-scene">

    <div id="knight-shadow"></div>

    <div id="knight-glow"></div>

    <div id="knight-layer">

      <img
        id="knight-img"
        src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200&auto=format&fit=crop"
      >

      <div id="fractures">
        <div class="fracture"></div>
        <div class="fracture"></div>
        <div class="fracture"></div>
      </div>

      <div id="eyes">
        <div class="eye"></div>
        <div class="eye"></div>
      </div>

    </div>

    <div id="knight-title">
      THE LAST ASHWARD
    </div>

  </div>

</section>

<script>

gsap.registerPlugin(ScrollTrigger);

/* THREE BACKGROUND */

const canvas = document.getElementById('three-canvas');

const renderer = new THREE.WebGLRenderer({
  canvas,
  alpha:true,
  antialias:true
});

renderer.setSize(window.innerWidth, window.innerHeight);

renderer.setPixelRatio(
  Math.min(window.devicePixelRatio,2)
);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.z = 5;

/* PARTICLES */

const geometry = new THREE.BufferGeometry();

const count = 1000;

const positions = new Float32Array(count * 3);

for(let i=0;i<count;i++){

  positions[i*3] =
    (Math.random()-0.5) * 20;

  positions[i*3+1] =
    (Math.random()-0.5) * 20;

  positions[i*3+2] =
    (Math.random()-0.5) * 10;
}

geometry.setAttribute(
  'position',
  new THREE.BufferAttribute(positions,3)
);

const material = new THREE.PointsMaterial({
  color:0xc8bfaa,
  size:0.03,
  transparent:true,
  opacity:0.25
});

const particles = new THREE.Points(
  geometry,
  material
);

scene.add(particles);

/* MOUSE */

let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

document.addEventListener('mousemove', e => {

  mouseX = e.clientX;
  mouseY = e.clientY;

});

/* KNIGHT */

const knightLayer =
  document.getElementById('knight-layer');

const knightImg =
  document.getElementById('knight-img');

const eyes =
  document.getElementById('eyes');

const fractures =
  document.getElementById('fractures');

let targetX = 0;
let targetY = 0;

let currentX = 0;
let currentY = 0;

let eyeTarget = 0;
let eyeCurrent = 0;

/* MOVEMENT */

document.addEventListener('mousemove', e => {

  const rect =
    knightLayer.getBoundingClientRect();

  const centerX =
    rect.left + rect.width/2;

  const centerY =
    rect.top + rect.height/2;

  const offsetX =
    (e.clientX - centerX) /
    window.innerWidth;

  const offsetY =
    (e.clientY - centerY) /
    window.innerHeight;

  targetY = offsetX * 24;
  targetX = -offsetY * 18;

  eyeTarget = offsetX * 10;

});

/* GYROSCOPE */

window.addEventListener(
  'deviceorientation',
  e => {

    if(!e.gamma) return;

    targetY = e.gamma * 0.35;
    targetX = (e.beta - 45) * 0.2;

  },
  { passive:true }
);

/* ANIMATION LOOP */

function animate(){

  requestAnimationFrame(animate);

  currentX +=
    (targetX - currentX) * 0.05;

  currentY +=
    (targetY - currentY) * 0.05;

  eyeCurrent +=
    (eyeTarget - eyeCurrent) * 0.08;

  const floatY =
    Math.sin(Date.now() * 0.0012) * 10;

  knightLayer.style.transform = `
    perspective(1600px)
    rotateX(${currentX}deg)
    rotateY(${currentY}deg)
    translateY(${floatY}px)
  `;

  knightImg.style.transform = `
    translateX(${currentY * 1.5}px)
    translateY(${currentX * 1.2}px)
    translateZ(60px)
    scale(1.03)
  `;

  eyes.style.transform = `
    translateX(calc(-50% + ${eyeCurrent}px))
    translateZ(120px)
  `;

  fractures.style.transform = `
    translateZ(90px)
  `;

  /* PARTICLES */

  particles.rotation.y += 0.0003;

  camera.position.x += (
    ((mouseX / window.innerWidth)-0.5)*0.5
    - camera.position.x
  ) * 0.02;

  camera.position.y += (
    (-(mouseY / window.innerHeight)+0.5)*0.5
    - camera.position.y
  ) * 0.02;

  renderer.render(scene,camera);
}

animate();

/* REVEAL */

ScrollTrigger.create({

  trigger:'#knight-section',

  start:'top 75%',

  onEnter:() => {

    knightImg.classList.add('visible');

    setTimeout(() => {
      fractures.classList.add('visible');
    },1000);

    setTimeout(() => {
      eyes.classList.add('visible');
    },1800);

    setTimeout(() => {
      document
        .getElementById('knight-title')
        .classList.add('visible');
    },2500);

  }

});

/* PARALLAX */

gsap.to('#knight-scene',{

  y:-80,

  ease:'none',

  scrollTrigger:{
    trigger:'#knight-section',
    start:'top bottom',
    end:'bottom top',
    scrub:1.5
  }

});

/* RESIZE */

window.addEventListener('resize',() => {

  camera.aspect =
    window.innerWidth /
    window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );

});

</script>

</body>

    translateZ(90px)
  `;

  /* PARTICLES */

  particles.rotation.y += 0.0003;

  camera.position.x += (
    ((mouseX / window.innerWidth)-0.5)*0.5
    - camera.position.x
  ) * 0.02;

  camera.position.y += (
    (-(mouseY / window.innerHeight)+0.5)*0.5
    - camera.position.y
  ) * 0.02;

  renderer.render(scene,camera);
}

animate();

/* REVEAL */

ScrollTrigger.create({

  trigger:'#knight-section',

  start:'top 75%',

  onEnter:() => {

    knightImg.classList.add('visible');

    setTimeout(() => {
      fractures.classList.add('visible');
    },1000);

    setTimeout(() => {
      eyes.classList.add('visible');
    },1800);

    setTimeout(() => {
      document
        .getElementById('knight-title')
        .classList.add('visible');
    },2500);

  }

});

/* PARALLAX */

gsap.to('#knight-scene',{

  y:-80,

  ease:'none',

  scrollTrigger:{
    trigger:'#knight-section',
    start:'top bottom',
    end:'bottom top',
    scrub:1.5
  }

});

/* RESIZE */

window.addEventListener('resize',() => {

  camera.aspect =
    window.innerWidth /
    window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );

});

</script>

</body>
</html>
